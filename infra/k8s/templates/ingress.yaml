apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    # Canary annotations can be added here later
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          # Strangler Pattern: Route /api/v2 to microservice
          - path: /api/v2/orders
            pathType: Prefix
            backend:
              service:
                name: orders-svc
                port:
                  number: 80
          # Default catch-all to Monolith
          - path: /
            pathType: Prefix
            backend:
              service:
                name: monolith
                port:
                  number: 80
