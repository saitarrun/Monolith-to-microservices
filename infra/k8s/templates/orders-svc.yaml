apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-svc
  labels:
    app: orders-svc
spec:
  replicas: {{ .Values.orders.replicas }}
  selector:
    matchLabels:
      app: orders-svc
  template:
    metadata:
      labels:
        app: orders-svc
    spec:
      containers:
        - name: orders-svc
          image: {{ .Values.orders.image }}
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-creds
                  key: url
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: kafka-creds
                  key: brokers
            - name: KAFKA_GROUP_ID
              value: orders-svc-group
---
apiVersion: v1
kind: Service
metadata:
  name: orders-svc
spec:
  selector:
    app: orders-svc
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
